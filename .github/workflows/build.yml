name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Lint Dockerfile (WARP Connector)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for WARP Connector
        id: meta-warp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/warp-connector
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          labels: |
            org.opencontainers.image.title=Cloudflare WARP Connector
            org.opencontainers.image.description=Docker-based Cloudflare WARP site-to-site connector
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Extract metadata for Docker Events Handler
        id: meta-dehandler
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dehandler
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          labels: |
            org.opencontainers.image.title=Docker Events Handler
            org.opencontainers.image.description=Automatic route configuration for Docker containers
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/main/docker-events/README.md
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push WARP Connector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: github.ref_type == 'tag'
          tags: ${{ steps.meta-warp.outputs.tags }}
          labels: ${{ steps.meta-warp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker Events Handler image
        uses: docker/build-push-action@v6
        with:
          context: ./docker-events
          file: ./docker-events/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: github.ref_type == 'tag'
          tags: ${{ steps.meta-dehandler.outputs.tags }}
          labels: ${{ steps.meta-dehandler.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.event_name == 'pull_request' }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            Pull the images with:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/warp-connector:${{ github.ref_name }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dehandler:${{ github.ref_name }}
            ```

            Or use the latest tag:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/warp-connector:latest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dehandler:latest
            ```

            ## Usage

            Update your `docker-compose.yml` to use the published images:
            ```yaml
            services:
              warp-connector:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/warp-connector:${{ github.ref_name }}
                # ... rest of configuration
              
              dehandler:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dehandler:${{ github.ref_name }}
                # ... rest of configuration
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
